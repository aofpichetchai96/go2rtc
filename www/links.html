<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Links - go2rtc</title>
    <style>
        .link-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none !important;
        }

        .link-item:hover {
            background: rgba(0, 217, 181, 0.05);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .link-item span {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .link-item small {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .code-box {
            background: #000;
            color: #00d9b5;
            font-family: monospace;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            word-break: break-all;
            border: 1px solid var(--border-color);
        }

        #links-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>

<body>
    <script src="main.js"></script>

    <main>
        <div class="card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <h1 id="stream-name" style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">
                    <span
                        style="width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent);"></span>
                </h1>
                <a href="index.html" class="btn-sm secondary">Back to Dashboard</a>
            </div>

            <div id="links-content"></div>
        </div>

        <div id="homekit-container" style="display: none; margin-top: 2rem;">
            <div id="homekit" class="card">
                <h2>HomeKit Integration</h2>
            </div>
        </div>



        <script>
            const src = new URLSearchParams(location.search).get('src')?.replace(/[<">]/g, '') || '';
            document.getElementById('stream-name').appendChild(document.createTextNode(`Links for: ${src}`));

            const container = document.getElementById('links-content');

            function createCard(title, description, content) {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.gap = '1rem';
                card.innerHTML = `
                    <h2 style="font-size: 1.1rem; margin-bottom: 0.25rem;">${title}</h2>
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin: 0;">${description}</p>
                    <div class="card-links" style="display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.5rem;">
                        ${content}
                    </div>
                `;
                return card;
            }

            // --- 1. General Links ---
            const generalContent = `
                <a href="stream.html?src=${encodeURIComponent(src)}" class="link-item" data-mode="auto"><span>Stream Viewer</span><small>Auto-select mode</small></a>
                <a href="api/streams?src=${encodeURIComponent(src)}" class="link-item" target="_blank"><span>Stream Info</span><small>JSON active connections</small></a>
            `;
            container.appendChild(createCard('General', 'Works with almost any device or browser', generalContent));

            // --- 2. High Quality Links ---
            const h26xContent = `
                <a href="stream.html?src=${encodeURIComponent(src)}&mode=webrtc" class="link-item" data-mode="webrtc"><span>WebRTC</span><small>Ultra-low latency</small></a>
                <a href="stream.html?src=${encodeURIComponent(src)}&mode=mse" class="link-item" data-mode="mse"><span>MSE</span><small>Chrome/Firefox/Safari Mac</small></a>
                <a href="api/stream.mp4?src=${encodeURIComponent(src)}" class="link-item" data-api="true" data-title="H.264 MP4"><span>H.264 MP4</span><small>Native browser playback</small></a>
                <a href="api/stream.m3u8?src=${encodeURIComponent(src)}" class="link-item" data-api="true" data-title="HLS/TS"><span>HLS/TS</span><small>Safari/Android Legacy</small></a>
                <a href="api/stream.m3u8?src=${encodeURIComponent(src)}&mp4" class="link-item" data-api="true" data-title="HLS/fMP4"><span>HLS/fMP4</span><small>Modern HLS</small></a>
            `;
            container.appendChild(createCard('High Quality', 'Optimized for H264/H265 sources', h26xContent));

            // --- 4. Dynamic RTSP Links ---
            fetch(new URL('api', location.href), { cache: 'no-cache' }).then(r => r.json()).then(data => {
                let rtsp = location.host + ':8554';
                try {
                    const host = data.host.match(/^[^:]+/)[0];
                    const port = data.rtsp.listen.match(/[0-9]+$/)[0];
                    rtsp = `${host}:${port}`;
                } catch (e) { }

                const rtspContent = `
                    <div class="code-box">rtsp://${rtsp}/${src}</div>
                    <a href="rtsp://${rtsp}/${src}" class="link-item"><span>RTSP Default</span><small>One video, one audio</small></a>
                    <a href="rtsp://${rtsp}/${src}?mp4" class="link-item"><span>RTSP for MP4</span><small>Frigate/Hass recording</small></a>
                    <a href="rtsp://${rtsp}/${src}?video=all&audio=all" class="link-item"><span>RTSP All Tracks</span><small>Experimental</small></a>
                    <div style="margin-top: 0.5rem;">
                        <small style="color: var(--text-secondary);">Command line:</small>
                        <div class="code-box" style="font-size: 0.7rem;">ffplay -fflags nobuffer -flags low_delay -rtsp_transport tcp "rtsp://${rtsp}/${src}"</div>
                    </div>
                `;
                // Insert after General card
                container.insertBefore(createCard('RTSP', 'For VLC, FFplay, or Network Recorders', rtspContent), container.children[1]);
            }).catch(e => console.error('API Fetch failed:', e));

            // --- 5. HomeKit Discovery ---
            fetch(`api/homekit?id=${src}`, { cache: 'no-cache' }).then(async (r) => {
                if (!r.ok || r.status === 204) return;
                const container = document.querySelector('#homekit-container');
                const div = document.querySelector('#homekit');
                container.style.display = 'block';
                div.innerHTML += `<div><a href="${r.url}" target="_blank">Config JSON</a></div>`;
            }).catch(e => console.error('HomeKit Fetch failed:', e));



            // --- 7. Modal Logic ---
            function openStreamPopup(mode) {
                const modal = document.getElementById('stream-modal');
                const modalBody = document.getElementById('modal-body');
                const modalTitle = document.getElementById('modal-title');

                const url = new URL('stream.html', location.href);
                url.searchParams.set('src', src);
                if (mode && mode !== 'auto') url.searchParams.set('mode', mode);
                
                modalTitle.innerText = `Live Stream: ${src} (${mode === 'auto' ? 'Auto' : mode.toUpperCase()})`;
                modalBody.innerHTML = `<iframe src="${url.href}" allow="autoplay; fullscreen" allowfullscreen style="width:100%; height:70vh; border:none; background:black;"></iframe>`;
                modal.classList.add('active');
            }

            function openIframePopup(url, titleStr) {
                const modal = document.getElementById('stream-modal');
                const modalBody = document.getElementById('modal-body');
                const modalTitle = document.getElementById('modal-title');
                
                modalTitle.innerText = `Live Stream: ${src} (${titleStr})`;
                // Directly load the URL (e.g., MP4 or HLS) in the iframe
                modalBody.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen style="width:100%; height:70vh; border:none; background:black;"></iframe>`;
                modal.classList.add('active');
            }

            function closeStreamPopup() {
                const modal = document.getElementById('stream-modal');
                const modalBody = document.getElementById('modal-body');
                modal.classList.remove('active');
                modalBody.innerHTML = ''; // Kill playback
            }

            // --- 8. Event Delegation ---
            function copyToClipboard(text, el) {
                navigator.clipboard.writeText(text).then(() => {
                    const span = el.querySelector('span');
                    const originalSpanText = span.innerText;
                    el.style.borderColor = 'var(--accent)';
                    span.innerText = 'Copied to Clipboard!';
                    setTimeout(() => {
                        el.style.borderColor = '';
                        span.innerText = originalSpanText;
                    }, 2000);
                }).catch(err => {
                    prompt('Copy this link:', text);
                });
            }

            document.addEventListener('click', e => {
                const link = e.target.closest('a.link-item');
                if (!link) return;
                
                const href = link.getAttribute('href');
                const mode = link.dataset.mode;
                const isApi = link.dataset.api;
                const title = link.dataset.title;

                if (mode) {
                    // It's a stream preview link (WebRTC, MSE, Auto)
                    e.preventDefault();
                    openStreamPopup(mode);
                } else if (isApi) {
                    // It's an API stream link (MP4, HLS)
                    e.preventDefault();
                    openIframePopup(href, title);
                } else if (href && href.startsWith('rtsp://')) {
                    // It's an RTSP link (copy)
                    e.preventDefault();
                    copyToClipboard(href, link);
                }
                // Otherwise (like Stream Info or Back to Dashboard), follow normal link
            });
        </script>
    </main>

    <!-- Modal for Stream Iframe (Dashboard Style) -->
    <div id="stream-modal" class="modal-overlay" onclick="if(event.target === this) closeStreamPopup()">
        <div class="modal-content" style="max-width: 1000px;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color);">
                <h3 id="modal-title" style="margin: 0; font-size: 1.1rem; color: var(--text-primary);">Live Stream</h3>
                <button class="close-btn" onclick="closeStreamPopup()" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.5rem;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body" style="background: black; padding: 0;">
                <!-- iframe inserted here -->
            </div>
        </div>
    </div>

    <style>
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-color, #0d1117);
            border: 1px solid var(--border-color, #30363d);
            border-radius: 12px;
            width: 95%;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .close-btn:hover { color: var(--danger, #f85149) !important; }
    </style>
