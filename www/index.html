<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream-go2rtc</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .info {
            color: #888;
        }

        .count-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 0.25rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .count-badge b {
            color: var(--accent);
            font-size: 1rem;
        }

        .action-icon {
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }

        .action-icon:hover {
            color: var(--accent);
            background: rgba(0, 217, 181, 0.1);
            border-color: rgba(0, 217, 181, 0.2);
        }

        .action-icon.danger:hover {
            color: var(--danger);
            background: rgba(248, 81, 73, 0.1);
            border-color: rgba(248, 81, 73, 0.2);
        }

        .action-icon.warning {
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.2);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .action-icon.warning:hover {
            background: rgba(255, 193, 7, 0.1);
            color: #ffca28;
            border-color: rgba(255, 193, 7, 0.4);
        }

        /* Form styles for modal */
        .form-group {
            margin-bottom: 1.25rem;
            padding: 0 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 217, 181, 0.1);
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.01);
        }

        .spin-anim {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <script src="main.js"></script>

    <main>
        <div class="card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <h1 style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">
                    <span
                        style="width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent);"></span>
                    Streams Dashboard
                </h1>
                <div class="controls" style="display: flex; gap: 1rem; align-items: center;">
                    <div id="total-cameras" class="count-badge" style="width: 200px;">
                        <i data-lucide="video" style="width: 16px; height: 16px;"></i>
                        Total Cameras: <b>0</b>
                    </div>
                    <input type="text" id="filter" placeholder="Filter streams..."
                        style="padding: 0.5rem 1rem; font-size: 0.85rem; width: 370px;">
                    <button id="refresh-btn" class="secondary"
                        style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 3.3rem;">
                        <i data-lucide="refresh-cw" style="width: 18px; height: 18px;"></i>
                        Refresh
                    </button>
                </div>
                <div class="controls" style="display: flex; gap: 1rem; align-items: center;">
                    <button id="select-all-btn" class="secondary btn-sm"
                        style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 3rem;">
                        <i data-lucide="check-square" style="width: 16px; height: 16px;"></i>
                        Select All
                    </button>
                    <button id="reset-selected-btn" class="action-icon warning btn-sm"
                        style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; width: 180px;">
                        <i data-lucide="x-square" style="width: 16px; height: 16px;"></i>
                        Reset Selected
                    </button>
                    <button id="multi-stream-btn" class="accent"
                        style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.25rem;">
                        <i data-lucide="play-circle" style="width: 18px; height: 18px;"></i>
                        Live View Selected
                    </button>
                    <button id="delete-selected-btn" class="danger"
                        style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.25rem;">
                        <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                        Delete Selected
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 35%;"><label><input id="selectall" type="checkbox"> Name</label></th>
                            <th style="width: 15%;">Type</th>
                            <th style="width: 15%;">Status</th>
                            <th style="width: 35%; text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="streams">
                    </tbody>
                </table>
            </div>

            <!-- Pagination Controls -->
            <div id="pagination"
                style="display: flex; justify-content: center; align-items: center; gap: 1.5rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <button id="prev-page" class="secondary btn-sm" style="min-width: 100px;">&larr; Previous</button>
                <span id="page-info" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">Page 1
                    of 1</span>
                <button id="next-page" class="secondary btn-sm" style="min-width: 100px;">Next &rarr;</button>
            </div>
        </div>
        </div>
        <div class="info"
            style="margin-top: 1rem; text-align: right; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;">
        </div>

        <!-- Modal for Stream Iframe -->
        <div id="stream-modal" class="modal-overlay" onclick="if(event.target === this) closeStreamPopup()">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">Live Stream</h3>
                    <button class="close-btn" onclick="closeStreamPopup()">&times;</button>
                </div>
                <div class="modal-body" id="modal-body" style="background: black;">
                    <!-- iframe inserted here -->
                </div>
            </div>
        </div>

        <!-- Edit Stream Modal -->
        <div id="edit-modal" class="modal-overlay" onclick="if(event.target === this) closeEditModal()">
            <div class="modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h3>Edit Stream</h3>
                    <button class="close-btn" onclick="closeEditModal()">&times;</button>
                </div>
                <div class="modal-body" style="padding: 1.5rem 0; background: var(--bg-color);">
                    <input type="hidden" id="edit-old-name">
                    <div class="form-group">
                        <label>Stream Name</label>
                        <input type="text" id="edit-name" placeholder="e.g., front_door">
                    </div>
                    <div class="form-group">
                        <label>Source URL / Command</label>
                        <input type="text" id="edit-url" placeholder="e.g., rtsp://...">
                    </div>
                    <div class="form-group">
                        <label>Camera Type</label>
                        <select id="edit-type" required>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="secondary" onclick="closeEditModal()">Cancel</button>
                    <button class="accent" onclick="saveStreamEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const templates = [
            '<a href="#" onclick="openStreamPopup(\'{name}\'); return false;" class="action-icon" title="Live Stream"><i data-lucide="play" style="width: 30px; height: 16px;"></i></a>',
            '<button onclick="copyStreamLink(\'{name}\')" class="btn-sm secondary" style="font-size: 0.75rem; padding: 0.3rem 0.6rem;">Copy HTTP</button>',
            '<a href="links.html?src={name}" class="action-icon" title="Data / Links" style="color: var(--accent); background: rgba(0, 217, 181, 0.05); border-color: rgba(0, 217, 181, 0.1);"><i data-lucide="database" style="width: 30px; height: 16px;"></i></a>',
            '<button onclick="openEditModal(\'{name}\', \'{url}\', \'{type}\')" class="action-icon warning" title="Edit Stream" style="width: 50px;">Edit</button>',
            '<button onclick="deleteStream(\'{name}\')" class="action-icon danger" title="Delete Stream" style="width: 60px;">Delete</button>',
        ];
        document.head.innerHTML += `
    <style>
        .btn-sm {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none !important;
        }
        .btn-sm.secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .btn-sm.secondary:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn-sm.danger {
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.2);
        }
        .btn-sm.danger:hover {
            background: var(--danger);
            color: white;
        }
        button.danger {
            background: rgba(248, 81, 73, 0.05);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.2);
        }
        button.danger:hover {
            background: var(--danger);
            color: white;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0, 217, 181, 0.1);
            color: var(--accent);
        }
        .status-badge.offline {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
        }
        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 rgba(0, 217, 181, 0.4);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 217, 181, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 217, 181, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 217, 181, 0); }
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 95%;
            max-width: 1400px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }
        .modal-content.full {
            width: 98%;
            max-width: 98%;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }
        .modal-header h3 { margin: 0; font-size: 1.1rem; color: var(--text-primary); }
        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
            padding: 0;
            font-weight: bold;
        }
        .close-btn:hover { color: var(--danger); }
        .modal-body { 
            padding: 0; 
            background: black; 
            width: 100%;
        }
        .modal-body iframe { 
            width: 100%; 
            height: 80vh; 
            min-height: 500px; 
            border: none; 
            display: block; 
        }
    </style>
    `;

        const selectedStreams = new Set();

        document.getElementById('multi-stream-btn')
            .addEventListener('click', () => {
                const url = new URL('stream.html', location.href);

                if (selectedStreams.size === 0) {
                    alert('Please select at least one stream.');
                    return;
                }

                openStreamPopup(Array.from(selectedStreams));
            });

        document.getElementById('delete-selected-btn')
            .addEventListener('click', deleteSelectedStreams);

        const tbody = document.getElementById('streams');

        function updateSelectAllHeader() {
            const currentCheckboxes = document.querySelectorAll('#streams input[type="checkbox"]');
            if (currentCheckboxes.length === 0) {
                document.getElementById('selectall').checked = false;
                return;
            }
            const allChecked = Array.from(currentCheckboxes).every(checkbox => checkbox.checked);
            document.getElementById('selectall').checked = allChecked;
        }

        // Handle checkbox changes to update global selection state
        tbody.addEventListener('change', ev => {
            if (ev.target.type === 'checkbox' && ev.target.name) {
                if (ev.target.checked) {
                    selectedStreams.add(ev.target.name);
                } else {
                    selectedStreams.delete(ev.target.name);
                }
                updateSelectAllHeader();
            }
        });

        async function deleteStream(name) {
            const src = decodeURIComponent(name);
            const message = `Confirm deletion of stream "${src}"? Type the name to perform this action.`;
            if (prompt(message) !== src) return;

            const url = new URL('api/streams', location.href);
            url.searchParams.set('src', src);

            try {
                await fetch(url, { method: 'DELETE' });
                reload();
            } catch (error) {
                console.error('Failed to delete the stream:', error);
            }
        }

        document.getElementById('selectall').addEventListener('change', ev => {
            document.querySelectorAll('#streams input[type="checkbox"]').forEach(el => {
                el.checked = ev.target.checked;
                if (ev.target.checked) {
                    selectedStreams.add(el.name);
                } else {
                    selectedStreams.delete(el.name);
                }
            });
        });

        document.getElementById('select-all-btn').addEventListener('click', () => {
            allFilteredStreamNames.forEach(name => selectedStreams.add(name));
            document.querySelectorAll('#streams input[type="checkbox"]').forEach(el => {
                el.checked = true;
            });
            document.getElementById('selectall').checked = true;
        });

        document.getElementById('reset-selected-btn').addEventListener('click', () => {
            selectedStreams.clear();
            document.querySelectorAll('#streams input[type="checkbox"]').forEach(el => {
                el.checked = false;
            });
            document.getElementById('selectall').checked = false;
        });

        const filterInput = document.getElementById('filter');
        let currentStreamPage = 1;
        const itemsPerPage = 6;
        let totalPages = 1;
        let allFilteredStreamNames = [];

        filterInput.addEventListener('input', () => {
            currentStreamPage = 1; // Reset to first page on filter change
            reload();
        });

        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentStreamPage > 1) {
                currentStreamPage--;
                reload();
            }
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (currentStreamPage < totalPages) {
                currentStreamPage++;
                reload();
            }
        });

        function reload() {
            const url = new URL('api/streams', location.href);

            fetch(url, { cache: 'no-cache' }).then(r => r.json()).then(data => {
                const filterValue = filterInput.value.toLowerCase();
                const totalCameras = Object.keys(data).length;
                document.getElementById('total-cameras').querySelector('b').innerText = totalCameras;

                // Filter and sort entries
                const filteredEntries = Object.entries(data).filter(([key]) => {
                    return !filterValue || key.toLowerCase().includes(filterValue);
                });

                allFilteredStreamNames = filteredEntries.map(([key]) => key);

                // Pagination logic
                totalPages = Math.ceil(filteredEntries.length / itemsPerPage) || 1;
                if (currentStreamPage > totalPages) currentStreamPage = totalPages;

                const startIndex = (currentStreamPage - 1) * itemsPerPage;
                const paginatedEntries = filteredEntries.slice(startIndex, startIndex + itemsPerPage);

                // Update Pagination UI
                document.getElementById('page-info').innerText = `Page ${currentStreamPage} of ${totalPages}`;
                document.getElementById('prev-page').disabled = currentStreamPage === 1;
                document.getElementById('next-page').disabled = currentStreamPage === totalPages;
                document.getElementById('prev-page').style.opacity = currentStreamPage === 1 ? '0.5' : '1';
                document.getElementById('next-page').style.opacity = currentStreamPage === totalPages ? '0.5' : '1';

                const fetchedIds = [];
                const existingIds = Array.from(tbody.querySelectorAll('tr')).map(tr => tr.dataset['id']);

                for (const [key, value] of paginatedEntries) {
                    const name = key.replace(/[<">]/g, ''); // sanitize
                    fetchedIds.push(name);

                    let tr = tbody.querySelector(`tr[data-id="${name}"]`);
                    const producers = value && value.producers ? value.producers : [];
                    const consumersCount = value && value.consumers ? value.consumers.length : 0;
                    const streamType = value && value.type ? value.type : '';
                    const streamUrl = producers.length > 0 ? producers[0].url : '';

                    const src = encodeURIComponent(name);
                    const encodedUrl = encodeURIComponent(streamUrl);
                    const encodedType = encodeURIComponent(streamType);

                    const links = templates.map(link =>
                        link.replace(/{name}/g, src)
                            .replace(/{url}/g, encodedUrl)
                            .replace(/{type}/g, encodedType)
                    ).join(' ');

                    if (!tr) {
                        tr = document.createElement('tr');
                        tr.dataset['id'] = name;
                        tbody.appendChild(tr);
                    }

                    const isChecked = selectedStreams.has(name) ? 'checked' : '';
                    const onlineHtml = consumersCount > 0
                        ? `<div class="status-badge"><span class="pulse"></span>${consumersCount} Active</div>`
                        : `<div class="status-badge offline">Idle</div>`;

                    tr.innerHTML =
                        `<td><label style="font-weight: 500; color: var(--text-primary);"><input type="checkbox" name="${name}" ${isChecked}>${name}</label></td>` +
                        `<td><span style="font-size: 0.85rem; color: var(--text-secondary); opacity: 0.8;">${streamType}</span></td>` +
                        `<td>${onlineHtml}</td>` +
                        `<td style="text-align: right; display: flex; gap: 0.5rem; justify-content: flex-end;">${links}</td>`;
                }

                // Remove rows that are not in the current paginated view
                existingIds.forEach(id => {
                    if (!fetchedIds.includes(id)) {
                        const trToRemove = tbody.querySelector(`tr[data-id="${id}"]`);
                        if (trToRemove) tbody.removeChild(trToRemove);
                    }
                });

                updateSelectAllHeader();
                if (window.lucide) window.lucide.createIcons();
            });
        }

        async function deleteSelectedStreams() {
            if (selectedStreams.size === 0) {
                alert('Please select at least one stream.');
                return;
            }

            if (!confirm(`Confirm deletion of ${selectedStreams.size} selected streams?`)) {
                return;
            }

            const streamNames = Array.from(selectedStreams);
            const succeeded = [];
            const failed = [];

            for (const src of streamNames) {
                try {
                    const url = new URL('api/streams', location.href);
                    url.searchParams.set('src', src);
                    const response = await fetch(url, { method: 'DELETE' });
                    if (!response.ok) {
                        throw new Error(`Failed to delete ${src}: ${response.statusText}`);
                    }
                    succeeded.push(src);
                    selectedStreams.delete(src);
                } catch (error) {
                    console.error('Delete failed for', src, error);
                    failed.push(`${src}: ${error.message}`);
                }
            }

            if (failed.length > 0) {
                alert(`Some streams could not be deleted:\n${failed.join('\n')}`);
            }

            reload();
        }

        // Initial load
        reload();

        document.getElementById('refresh-btn').addEventListener('click', () => {
            const btn = document.getElementById('refresh-btn');
            const icon = btn.querySelector('i, svg');
            if (icon) icon.classList.add('spin-anim');
            reload();
            if (icon) setTimeout(() => icon.classList.remove('spin-anim'), 1000);
        });

        const apiInfoUrl = new URL('api', location.href);
        fetch(apiInfoUrl, { cache: 'no-cache' }).then(r => r.json()).then(data => {
            const info = document.querySelector('.info');
            info.innerText = `v${data.version} • ${data.config_path}`;
        });

        // Modal UI functions
        function copyStreamLink(encodedName) {
            const url = new URL(`stream.html?src=${encodedName}`, window.location.href).href;
            navigator.clipboard.writeText(url).then(() => {
                alert('คัดลอกลิงก์สำเร็จ:\n' + url);
            }).catch(err => {
                console.error('Failed to copy', err);
                prompt('คัดลอกลิงก์ด้านล่างไปใช้งาน:', url);
            });
        }

        function openStreamPopup(sources) {
            if (!Array.isArray(sources)) sources = [sources];

            const title = sources.length === 1 ? decodeURIComponent(sources[0]) : `Multiple Views (${sources.length})`;
            document.getElementById('modal-title').innerText = 'Live: ' + title;

            let mode = document.querySelectorAll('.card input[type="checkbox"]:not(#selectall)');
            mode = Array.from(mode).filter(i => i.checked && ['webrtc', 'mse', 'hls', 'mjpeg'].includes(i.name)).map(i => i.name).join(',');

            const url = new URL(`stream.html`, window.location.href);

            sources.forEach(src => {
                url.searchParams.append('src', decodeURIComponent(src));
            });

            if (mode) url.searchParams.set('mode', mode);

            // For multi-stream, adjust grid to max 3 per row (32% approx)
            if (sources.length > 1) {
                document.querySelector('.modal-content').classList.add('full');
                url.searchParams.set('width', '32%');
            } else {
                document.querySelector('.modal-content').classList.remove('full');
            }

            document.getElementById('modal-body').innerHTML = `<iframe src="${url.href}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('stream-modal').classList.add('active');
        }

        function closeStreamPopup() {
            document.getElementById('stream-modal').classList.remove('active');
            document.getElementById('modal-body').innerHTML = ''; // Clear iframe to stop playback
        }

        async function openEditModal(encodedName, encodedUrl, encodedType) {
            const name = decodeURIComponent(encodedName);
            const url = decodeURIComponent(encodedUrl);
            const type = decodeURIComponent(encodedType);

            document.getElementById('edit-old-name').value = name;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-url').value = url;

            // Fetch types to populate select
            const typeSelect = document.getElementById('edit-type');
            try {
                const response = await fetch('api/types');
                const types = await response.json();
                typeSelect.innerHTML = types.map(t => `<option value="${t.name}" ${t.name === type ? 'selected' : ''}>${t.name}</option>`).join('');
            } catch (e) {
                console.error('Failed to fetch types', e);
            }

            document.getElementById('edit-modal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        async function saveStreamEdit() {
            const oldName = document.getElementById('edit-old-name').value;
            const newName = document.getElementById('edit-name').value;
            const newUrl = document.getElementById('edit-url').value;
            const newType = document.getElementById('edit-type').value;

            if (!newName || !newUrl) {
                alert('Name and URL are required.');
                return;
            }

            // If name changed, delete old one FIRST
            if (oldName !== newName) {
                const delUrl = new URL('api/streams', location.href);
                delUrl.searchParams.set('src', oldName);
                await fetch(delUrl, { method: 'DELETE' });
            }

            // Save new/updated stream (PUT overwrites if name is same)
            const putUrl = new URL('api/streams', location.href);
            putUrl.searchParams.set('src', newUrl);
            putUrl.searchParams.set('name', newName);
            putUrl.searchParams.set('type', newType);

            try {
                await fetch(putUrl, { method: 'PUT' });
                closeEditModal();
                reload();
            } catch (e) {
                alert('Failed to save changes: ' + e.message);
            }
        }

        reload();
    </script>
