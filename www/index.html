<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>go2rtc</title>
    <style>
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .info {
            color: #888;
        }
    </style>
</head>

<body>

    <script src="main.js"></script>

    <main>
        <div class="card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <h1 style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">
                    <span
                        style="width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent);"></span>
                    Streams Dashboard
                </h1>
                <div class="controls" style="display: flex; gap: 1rem; align-items: center;">
                    <input type="text" id="filter" placeholder="Filter streams..."
                        style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                    <button id="multi-stream-btn">Open selected</button>
                </div>
            </div>

            <div
                style="margin-bottom: 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border-color);">
                <div
                    style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; margin-right: 0.5rem;">
                    Playback Modes:</div>
                <label><input type="checkbox" name="webrtc" checked> WebRTC</label>
                <label><input type="checkbox" name="mse" checked> MSE</label>
                <label><input type="checkbox" name="hls" checked> HLS</label>
                <label><input type="checkbox" name="mjpeg" checked> MJPEG</label>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50%;"><label><input id="selectall" type="checkbox"> Name</label></th>
                            <th style="width: 20%;">Status</th>
                            <th style="width: 30%; text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="streams">
                    </tbody>
                </table>
            </div>
        </div>
        </div>
        <div class="info"
            style="margin-top: 1rem; text-align: right; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;">
        </div>

        <!-- Modal for Stream Iframe -->
        <div id="stream-modal" class="modal-overlay" onclick="if(event.target === this) closeStreamPopup()">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">Live Stream</h3>
                    <button class="close-btn" onclick="closeStreamPopup()">&times;</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- iframe inserted here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const templates = [
            '<a href="#" onclick="openStreamPopup(\'{name}\'); return false;" class="btn-sm">Stream</a>',
            '<button onclick="copyStreamLink(\'{name}\')" class="btn-sm secondary">Copy Link</button>',
            '<a href="links.html?src={name}" class="btn-sm secondary">Links</a>',
            '<a href="#" data-name="{name}" class="btn-sm danger">Delete</a>',
        ];

        document.head.innerHTML += `
    <style>
        .btn-sm {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none !important;
        }
        .btn-sm.secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .btn-sm.secondary:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn-sm.danger {
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.2);
        }
        .btn-sm.danger:hover {
            background: var(--danger);
            color: white;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0, 217, 181, 0.1);
            color: var(--accent);
        }
        .status-badge.offline {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
        }
        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 rgba(0, 217, 181, 0.4);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 217, 181, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 217, 181, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 217, 181, 0); }
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }
        .modal-header h3 { margin: 0; font-size: 1.1rem; color: var(--text-primary); }
        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
            padding: 0;
            font-weight: bold;
        }
        .close-btn:hover { color: var(--danger); }
        .modal-body { 
            padding: 0; 
            background: black; 
            width: 100%;
        }
        .modal-body iframe { 
            width: 100%; 
            height: 50vh; 
            min-height: 400px; 
            border: none; 
            display: block; 
        }
    </style>
    `;

        document.getElementById('multi-stream-btn')
            .addEventListener('click', () => {
                const url = new URL('stream.html', location.href);

                const streams = document.querySelectorAll('#streams input');
                streams.forEach(i => {
                    if (i.checked) url.searchParams.append('src', i.name);
                });

                if (!url.searchParams.has('src')) return;

                let mode = document.querySelectorAll('.card input[type="checkbox"]:not(#selectall)');
                mode = Array.from(mode).filter(i => i.checked && ['webrtc', 'mse', 'hls', 'mjpeg'].includes(i.name)).map(i => i.name).join(',');

                window.location.href = `${url.toString()}&mode=${mode}`;
            });

        const tbody = document.getElementById('streams');
        tbody.addEventListener('click', async ev => {
            if (!ev.target.classList.contains('danger')) return;

            ev.preventDefault();

            const src = decodeURIComponent(ev.target.dataset.name);

            const message = `Confirm deletion of stream "${src}"? Type the name to perform this action.`;
            if (prompt(message) !== src) {
                return;
            }

            const url = new URL('api/streams', location.href);
            url.searchParams.set('src', src);

            try {
                await fetch(url, { method: 'DELETE' });
                reload();
            } catch (error) {
                console.error('Failed to delete the stream:', error);
            }
        });

        document.getElementById('selectall').addEventListener('change', ev => {
            document.querySelectorAll('#streams input').forEach(el => {
                el.checked = ev.target.checked;
            });
        });

        const filterInput = document.getElementById('filter');
        filterInput.addEventListener('input', () => reload());

        function reload() {
            const url = new URL('api/streams', location.href);
            const checkboxStates = {};
            tbody.querySelectorAll('input[type="checkbox"][name]').forEach(checkbox => {
                checkboxStates[checkbox.name] = checkbox.checked;
            });

            fetch(url, { cache: 'no-cache' }).then(r => r.json()).then(data => {
                const existingIds = Array.from(tbody.querySelectorAll('tr')).map(tr => tr.dataset['id']);
                const fetchedIds = [];
                const filterValue = filterInput.value.toLowerCase();

                for (const [key, value] of Object.entries(data)) {
                    if (filterValue && !key.toLowerCase().includes(filterValue)) continue;

                    const name = key.replace(/[<">]/g, ''); // sanitize
                    fetchedIds.push(name);

                    let tr = tbody.querySelector(`tr[data-id="${name}"]`);
                    const consumersCount = value && value.consumers ? value.consumers.length : 0;
                    const src = encodeURIComponent(name);
                    const links = templates.map(link => link.replace('{name}', src)).join(' ');

                    if (!tr) {
                        tr = document.createElement('tr');
                        tr.dataset['id'] = name;
                        tbody.appendChild(tr);
                    }

                    const isChecked = checkboxStates[name] ? 'checked' : '';
                    const onlineHtml = consumersCount > 0
                        ? `<div class="status-badge"><span class="pulse"></span>${consumersCount} Active</div>`
                        : `<div class="status-badge offline">Idle</div>`;

                    tr.innerHTML =
                        `<td><label style="font-weight: 500; color: var(--text-primary);"><input type="checkbox" name="${name}" ${isChecked}>${name}</label></td>` +
                        `<td>${onlineHtml}</td>` +
                        `<td style="text-align: right; display: flex; gap: 0.5rem; justify-content: flex-end;">${links}</td>`;
                }

                // Remove old rows
                existingIds.forEach(id => {
                    if (!fetchedIds.includes(id)) {
                        const trToRemove = tbody.querySelector(`tr[data-id="${id}"]`);
                        if (trToRemove) tbody.removeChild(trToRemove);
                    }
                });
            });
        }

        // Auto-reload
        setInterval(reload, 2000);

        const apiInfoUrl = new URL('api', location.href);
        fetch(apiInfoUrl, { cache: 'no-cache' }).then(r => r.json()).then(data => {
            const info = document.querySelector('.info');
            info.innerText = `v${data.version} • ${data.config_path}`;
        });

        // Modal UI functions
        function copyStreamLink(encodedName) {
            const url = new URL(`stream.html?src=${encodedName}`, window.location.href).href;
            navigator.clipboard.writeText(url).then(() => {
                alert('คัดลอกลิงก์สำเร็จ:\n' + url);
            }).catch(err => {
                console.error('Failed to copy', err);
                prompt('คัดลอกลิงก์ด้านล่างไปใช้งาน:', url);
            });
        }

        function openStreamPopup(encodedName) {
            const title = decodeURIComponent(encodedName);
            document.getElementById('modal-title').innerText = 'Live: ' + title;

            let mode = document.querySelectorAll('.card input[type="checkbox"]:not(#selectall)');
            mode = Array.from(mode).filter(i => i.checked && ['webrtc', 'mse', 'hls', 'mjpeg'].includes(i.name)).map(i => i.name).join(',');

            const url = new URL(`stream.html`, window.location.href);
            url.searchParams.set('src', title); // set automatically encodes
            if (mode) url.searchParams.set('mode', mode);

            document.getElementById('modal-body').innerHTML = `<iframe src="${url.href}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('stream-modal').classList.add('active');
        }

        function closeStreamPopup() {
            document.getElementById('stream-modal').classList.remove('active');
            document.getElementById('modal-body').innerHTML = ''; // Clear iframe to stop playback
        }

        reload();
    </script>

</body>

</body>

</html>
