<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>net - go2rtc</title>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        html, body, #network {
            height: 100%;
        }
    </style>
</head>
<body>

<script src="main.js"></script>

<div id="network" style="height: calc(100vh - 80px); background: transparent;"></div>

<script>
    /* global vis */
    window.addEventListener('load', () => {
        const url = new URL('api/streams.dot' + location.search, location.href);

        const container = document.getElementById('network');
        const options = {
            edges: {
                font: {align: 'middle', color: '#8b949e', strokeWidth: 0},
                smooth: {type: 'continuous'},
                color: {color: '#30363d', highlight: '#00d9b5'},
                arrows: {to: {enabled: true, scaleFactor: 0.5}}
            },
            nodes: {
                shape: 'box',
                font: {color: '#e6edf3', face: 'Inter'},
                color: {
                    border: '#30363d',
                    background: '#161b22',
                    highlight: {border: '#00d9b5', background: '#0d1117'}
                },
                borderWidth: 1,
                borderRadius: 8,
                shadow: true
            },
            physics: {
                enabled: true,
                solver: 'repulsion',
                repulsion: {nodeDistance: 150}
            },
        };

        let network;

        async function update() {
            try {
                const response = await fetch(url, {cache: 'no-cache'});
                const dotData = await response.text();
                const data = vis.parseDOTNetwork(dotData);

                if (!network) {
                    network = new vis.Network(container, data, options);
                } else {
                    const positions = network.getPositions();
                    const viewPosition = network.getViewPosition();
                    const scale = network.getScale();
                    const selectedNodes = network.getSelectedNodes();

                    network.setData(data);

                    for (const nodeId in positions) {
                        if (positions[nodeId]) {
                            network.moveNode(nodeId, positions[nodeId].x, positions[nodeId].y);
                        }
                    }

                    network.moveTo({position: viewPosition, scale: scale});
                    network.selectNodes(selectedNodes);
                }
            } catch (error) {
                console.error('Error fetching network data:', error);
            }

            setTimeout(update, 5000);
        }

        update();
    });
</script>

</body>
</html>
