<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream-Users</title>
    <!-- main.js handles the global layout, css, and lucide icons base -->
</head>

<body>
    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2>User Management</h2>
            <button id="add-user-btn" style="display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="user-plus" style="width: 18px;"></i> Add User
            </button>
        </div>

        <div id="add-user-form-container" class="card"
            style="display: none; margin-bottom: 2rem; animation: formAppear 0.3s ease-out;">
            <h3 style="margin-bottom: 1rem;">Create New User</h3>
            <form id="add-user-form" style="display: flex; gap: 1rem; align-items: flex-end;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Username" required autocomplete="off">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Password" required autocomplete="new-password">
                </div>
                <button type="submit" style="height: 42px;">Save</button>
                <button type="button" id="cancel-user-btn" class="secondary" style="height: 42px;">Cancel</button>
            </form>
            <div id="form-error" style="color: var(--danger); margin-top: 1rem; display: none;"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadUsers();

            const formContainer = document.getElementById('add-user-form-container');
            const formError = document.getElementById('form-error');

            document.getElementById('add-user-btn').addEventListener('click', () => {
                formContainer.style.display = 'block';
                formError.style.display = 'none';
                document.getElementById('username').focus();
            });

            document.getElementById('cancel-user-btn').addEventListener('click', () => {
                formContainer.style.display = 'none';
                document.getElementById('add-user-form').reset();
            });

            document.getElementById('add-user-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;

                const formData = new URLSearchParams();
                formData.append('username', document.getElementById('username').value);
                formData.append('password', document.getElementById('password').value);

                try {
                    const r = await fetch('api/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });

                    if (r.ok) {
                        document.getElementById('add-user-form').reset();
                        formContainer.style.display = 'none';
                        await loadUsers();
                    } else {
                        const txt = await r.text();
                        formError.textContent = txt || 'Failed to create user';
                        formError.style.display = 'block';
                    }
                } catch (err) {
                    formError.textContent = 'Network error';
                    formError.style.display = 'block';
                }
                btn.disabled = false;
            });
        });

        async function loadUsers() {
            try {
                const r = await fetch('api/users');
                if (!r.ok) return;
                const users = await r.json();

                const tbody = document.getElementById('user-list');
                tbody.innerHTML = '';

                if (!users || users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-secondary);">No users found</td></tr>';
                    return;
                }

                users.forEach(u => {
                    const tr = document.createElement('tr');

                    const isSystemAdmin = u.username === 'admin';

                    tr.innerHTML = `
                        <td>${u.id}</td>
                        <td><strong>${u.username}</strong> ${isSystemAdmin ? '<span style="font-size: 0.75rem; background: var(--accent); color: black; padding: 2px 6px; border-radius: 4px; margin-left: 8px;">Default</span>' : ''}</td>
                        <td>${u.role}</td>
                        <td style="text-align: right;">
                            ${!isSystemAdmin ? `<button class="danger" onclick="deleteUser('${u.username}')" style="padding: 0.5rem; display: inline-flex;"><i data-lucide="trash-2" style="width: 16px;"></i></button>` : `<span style="color: var(--text-secondary); font-size: 0.85rem;">Protected</span>`}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                lucide.createIcons();
            } catch (e) {
                console.error('Failed to load users:', e);
            }
        }

        async function deleteUser(username) {
            if (!confirm('Are you sure you want to delete user ' + username + '?')) return;

            try {
                const r = await fetch('api/users?username=' + encodeURIComponent(username), { method: 'DELETE' });
                if (r.ok) {
                    await loadUsers();
                } else {
                    alert('Failed to delete user');
                }
            } catch (e) {
                alert('Network error');
            }
        }
    </script>
</body>

</html>
