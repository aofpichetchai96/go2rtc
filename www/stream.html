<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" href="https://alexxit.github.io/go2rtc/icons/apple-touch-icon-180x180.png"
        sizes="180x180">
    <link rel="icon" href="https://alexxit.github.io/go2rtc/icons/favicon.ico">
    <link rel="manifest" href="https://alexxit.github.io/go2rtc/manifest.json">
    <title>Stream-View</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            display: flex;
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .flex {
            flex-wrap: wrap;
            align-content: flex-start;
            align-items: flex-start;
        }
    </style>
</head>

<body style="background:radial-gradient(circle at center, #161b22 0%, #0d1117 100%);">
    <script type="module" src="./video-stream.js"></script>
    <script type="module">
        const params = new URLSearchParams(location.search);

        // support multiple streams and multiple modes
        const streams = params.getAll('src').filter(s => s !== '');
        const modes = params.getAll('mode');

        function showNoCamera() {
            document.body.innerHTML = '';
            document.body.style.background = 'black';
            const msg = document.createElement('div');
            msg.innerText = 'No Camera';
            msg.style.cssText = 'color: white; font-family: Arial, sans-serif; font-size: 2rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);';
            document.body.appendChild(msg);
        }

        if (streams.length === 0) {
            showNoCamera();
            throw new Error('No stream source provided');
        }

        if (modes.length === 0) modes.push('');

        while (modes.length > streams.length) {
            streams.push(streams[0]);
        }
        while (streams.length > modes.length) {
            modes.push(modes[0]);
        }

        if (streams.length > 1) {
            document.body.className = 'flex';
        }

        const background = params.get('background') !== 'false';
        const width = '1 1 ' + (params.get('width') || '45%');

        for (let i = 0; i < streams.length; i++) {
            /** @type {VideoStream} */
            const video = document.createElement('video-stream');
            video.background = background;
            video.mode = modes[i] || video.mode;
            video.style.flex = width;
            video.style.borderRadius = '0px';
            video.style.overflow = 'hidden';
            video.style.boxShadow = '0 8px 32px rgba(0,0,0,0.4)';
            video.style.border = '1px solid rgba(255,255,255,0.05)';
            video.dataset.name = streams[i];
            video.src = new URL('api/ws?src=' + encodeURIComponent(streams[i]), location.href);
            document.body.appendChild(video);
        }

        document.title = streams.join('/') + ' - go2rtc';

        // 30 seconds timeout to check if videos loaded
        setTimeout(() => {
            const containers = document.querySelectorAll('video-stream');
            let loadedCount = 0;
            containers.forEach(container => {
                const v = container.querySelector('video');
                const loaded = v && (v.readyState >= 2 || v.videoWidth > 0 || v.currentTime > 0);

                if (loaded) {
                    loadedCount++;
                } else {
                    const name = container.dataset.name || 'Unknown';
                    container.innerHTML = `<div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #666; border-radius: 12px; border: 1px dashed #333; gap: 8px;">
                        <span style="font-size: 1.2rem; font-weight: 500;">No Camera</span>
                        <span style="font-size: 0.85rem; opacity: 0.8; font-family: monospace;">[ ${name} ]</span>
                    </div>`;
                }
            });

            console.log(`Stream Check: ${loadedCount}/${containers.length} streams loaded`);
        }, 30000);
    </script>
    <style>
        .flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 10px;
            gap: 10px;
        }

        video-stream {
            background: #000;
            transition: transform 0.3s ease;
        }

        video-stream:hover {
            transform: scale(1.02);
            z-index: 10;
        }
    </style>
</body>

</html>
